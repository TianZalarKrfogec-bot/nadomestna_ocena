<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registracija - Moji Zapiski</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        h2 { color: #1a1a1a; margin-bottom: 10px; font-size: 24px; }
        p.subtitle { color: #65676b; margin-bottom: 25px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #42b72a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .error-box {
            background-color: #ffebe8;
            border: 1px solid #dd3c10;
            color: #dd3c10;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .footer { margin-top: 25px; border-top: 1px solid #dddfe2; padding-top: 20px; font-size: 14px; }
        .footer a { color: #1877f2; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ustvari nov račun</h2>
        <p class="subtitle">Hitro in enostavno se pridruži projektu.</p>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Uporabniško ime" required>
            <input type="password" name="password" placeholder="Geslo" required>
            <button type="submit">Registracija</button>
        </form>

        <div class="footer">
            Že imaš račun? <a href="{{ url_for('login') }}">Prijavi se</a>
        </div>
    </div>
</body>
</html>
