<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>(si)x - Ponastavitev</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 1.5rem 0; border: 1px solid #e2e8f0; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin:0;">Ponastavitev gesla</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-top: 0.5rem;">Vnesite uporabniško ime za nadaljevanje.</p>
        <form action="/forgot_password" method="POST">
            <input type="text" name="username" placeholder="Uporabniško ime" required>
            <button type="submit">Poišči račun</button>
        </form>
    </div>
</body>
</html>
