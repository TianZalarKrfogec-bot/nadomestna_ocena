<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(si)x - Dobrodošli</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-bottom: 10px;
            color: #6366f1; /* Indigo barva za (si)x logo */
            font-size: 2.5rem;
            font-weight: 800;
        }

        p {
            color: #64748b;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .btn-login {
            background-color: #6366f1;
            color: white;
        }

        .btn-login:hover {
            background-color: #4f46e5;
            transform: translateY(-1px);
        }

        .btn-register {
            background-color: #f1f5f9;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }

        .btn-register:hover {
            background-color: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>(si)x</h1>
        <p>Dobrodošli v (si)x!(kjer se šestka upgrada v sedemko)</p>
        
        <div class="btn-group">
            <a href="{{ url_for('login') }}" class="btn btn-login">Prijava</a>
            <a href="{{ url_for('register') }}" class="btn btn-register">Registracija</a>
        </div>
    </div>

</body>
</html>
