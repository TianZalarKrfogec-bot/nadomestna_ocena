<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(si)x - Dobrodošli</title>
    <style>
        :root { --primary: #6366f1; --dark: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .hero { text-align: center; padding: 2rem; }
        .logo { font-size: 4rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 1rem; color: var(--primary); }
        .tagline { font-size: 1.2rem; color: #94a3b8; margin-bottom: 2.5rem; }
        .btn { padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: 0.2s; display: inline-block; margin: 0 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-outline { border: 2px solid #334155; color: white; }
        .btn-outline:hover { background: #334155; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">(si)x</div>
        <div class="tagline">Naslednja generacija vaše produktivnosti.</div>
        <a href="/login" class="btn btn-primary">Prijava</a>
        <a href="/register" class="btn btn-outline">Ustvari račun</a>
    </div>
</body>
</html>
