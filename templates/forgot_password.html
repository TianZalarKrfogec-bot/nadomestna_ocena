<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponastavitev gesla</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        h2 { color: #1a1a1a; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: #1877f2; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-box { background-color: #ffebe8; border: 1px solid #dd3c10; color: #dd3c10; padding: 10px; border-radius: 6px; margin-bottom: 20px; }
        .question-text { background: #f8f9fa; padding: 10px; border-radius: 6px; margin: 10px 0; font-style: italic; color: #1c1e21; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ponastavitev gesla</h2>

        {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

        <form method="POST">
            {% if not user %}
                <p>Vnesite svoje uporabniško ime, da poiščemo vaše varnostno vprašanje.</p>
                <input type="text" name="username" placeholder="Uporabniško ime" required>
                <button type="submit">Išči</button>
            {% else %}
                <input type="hidden" name="username" value="{{ user.username }}">
                
                <p>Vaše varnostno vprašanje:</p>
                <div class="question-text">{{ user.security_question }}</div>
                
                <input type="text" name="security_answer" placeholder="Vaš odgovor" required>
                <input type="password" name="new_password" placeholder="Novo geslo" required>
                
                <button type="submit">Spremeni geslo</button>
            {% endif %}
        </form>

        <div style="margin-top: 20px;">
            <a href="/login" style="color: #1877f2; text-decoration: none; font-size: 14px;">Nazaj na prijavo</a>
        </div>
    </div>
</body>
</html>
