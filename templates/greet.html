<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobrodošli - Moji Zapiski</title>
    <style>
        /* Osnovno oblikovanje, da bo stran izgledala čista */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* Gumbi */
        .btn {
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-login {
            background-color: #3498db;
            color: white;
        }

        .btn-login:hover {
            background-color: #2980b9;
        }

        .btn-register {
            background-color: #2ecc71;
            color: white;
        }

        .btn-register:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Moji Zapiski 📝</h1>
        <p>Varno shranite svoje misli in dostopajte do njih kjerkoli.</p>
        
        <div class="btn-group">
            <a href="{{ url_for('login') }}" class="btn btn-login">Prijava</a>
            <a href="{{ url_for('register') }}" class="btn btn-register">Registracija</a>
        </div>
    </div>

</body>
</html>
