<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(si)x - Ponastavitev gesla</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f8fafc; 
            color: #1e293b;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        h2 { color: #1e293b; margin-bottom: 20px; font-weight: 700; }
        
        p { color: #64748b; font-size: 14px; margin-bottom: 15px; }

        .question-box {
            background-color: #f1f5f9;
            border-left: 4px solid #6366f1;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
        .question-label { font-size: 12px; text-transform: uppercase; color: #6366f1; font-weight: 700; margin-bottom: 5px; }
        .question-text { font-size: 16px; color: #1e293b; font-style: italic; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
        }
        input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        
        button {
            width: 100%;
            padding: 14px;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        button:hover { background-color: #4f46e5; }

        .error-box { background-color: #fee2e2; border: 1px solid #ef4444; color: #b91c1c; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        
        .footer { margin-top: 25px; font-size: 14px; }
        .footer a { color: #6366f1; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ponastavitev</h2>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% if not user %}
                <p>Vnesite uporabniško ime, da poiščemo vaše varnostno vprašanje.</p>
                <input type="text" name="username" placeholder="Uporabniško ime" required>
                <button type="submit">Išči uporabnika</button>
            {% else %}
                <input type="hidden" name="username" value="{{ user.username }}">
                
                <div class="question-box">
                    <div class="question-label">Vaše vprašanje:</div>
                    <div class="question-text">{{ user.security_question }}</div>
                </div>

                <input type="text" name="security_answer" placeholder="Vaš odgovor" required>
                <input type="password" name="new_password" placeholder="Novo geslo" required>
                
                <button type="submit">Posodobi geslo</button>
            {% endif %}
        </form>

        <div class="footer">
            <a href="{{ url_for('login') }}">Nazaj na prijavo</a>
        </div>
    </div>
</body>
</html>
