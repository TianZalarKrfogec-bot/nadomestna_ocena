<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(si)x - Prijava</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #1e293b;
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); 
            width: 100%; 
            max-width: 400px; 
            border: 1px solid #e2e8f0;
        }
        .logo { 
            font-size: 32px; 
            font-weight: 800; 
            color: #6366f1; 
            text-align: center; 
            margin-bottom: 10px; 
            text-decoration: none;
            display: block;
        }
        h2 { text-align: center; margin-bottom: 30px; font-weight: 600; color: #475569; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #6366f1; border-width: 2px; }
        
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background-color: #6366f1; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover { background-color: #4f46e5; }
        
        .error-msg { 
            background: #fee2e2; 
            color: #ef4444; 
            padding: 10px; 
            border-radius: 6px; 
            margin-bottom: 20px; 
            font-size: 14px; 
            text-align: center; 
        }
        .footer-links { text-align: center; margin-top: 25px; font-size: 14px; color: #64748b; }
        .footer-links a { color: #6366f1; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="/" class="logo">(si)x</a>
        <h2>Dobrodošel nazaj</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Uporabniško ime</label>
                <input type="text" id="username" name="username" placeholder="Vnesi ime..." required>
            </div>
            
            <div class="form-group">
                <label for="password">Geslo</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Prijavi se</button>
        </form>

        <div class="footer-links">
            Še nimaš računa? <a href="/register">Registriraj se</a>
        </div>
    </div>

</body>
</html>
