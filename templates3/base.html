<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiction Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 { color: #c4b5fd; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .nav-links a {
            color: #f8fafc;
            text-decoration: none;
            margin-left: 1rem;
            transition: color 0.3s;
        }
        
        .nav-links a:hover { color: #8b5cf6; }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-panel h2 { text-align: center; margin-bottom: 1.5rem; color: #ddd6fe; }

        .form-group { margin-bottom: 1.2rem; }
        
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #a78bfa; }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.4); /* Malo temnejše ozadje */
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: border 0.3s;
        }

        /* Dodaj tole specifično za možnosti v spustnem seznamu */
        .form-group select option {
            background-color: #1e1b4b; /* Temno vijolična, da se ujema s temo */
            color: white;
        }

        .form-group input:focus, .form-group select:focus { border-color: #8b5cf6; }

        .btn {
            width: 100%;
            padding: 0.8rem;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn:hover { background: #6d28d9; transform: translateY(-2px); }

        .error-msg {
            background: rgba(239, 68, 68, 0.2);
            border-left: 4px solid #ef4444;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .success-msg {
            background: rgba(16, 185, 129, 0.2);
            border-left: 4px solid #10b981;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .link-text { display: block; text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #c4b5fd; text-decoration: none;}
        .link-text:hover { color: white; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Fiction Chat</h1>
        <div class="nav-links">
            {% if session.user_id %}
                <a href="/dashboard">Dashboard</a>
                <a href="/profile">Profil</a>
                <a href="/logout">Odjava</a>
            {% else %}
                <a href="/login">Prijava</a>
                <a href="/register">Registracija</a>
                <a href="/dashboard">Dashboard</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
